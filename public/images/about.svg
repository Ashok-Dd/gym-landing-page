<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1c0808"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- dumbbell silhouette -->
  <rect x="250" y="270" width="300" height="40" rx="6" fill="#1e1e1e"/>
  <rect x="220" y="230" width="60" height="120" rx="10" fill="#252525"/>
  <rect x="520" y="230" width="60" height="120" rx="10" fill="#252525"/>
  <rect x="195" y="250" width="40" height="80" rx="6" fill="#2a2a2a"/>
  <rect x="565" y="250" width="40" height="80" rx="6" fill="#2a2a2a"/>
  <!-- label -->
  <text x="400" y="430" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="16" letter-spacing="4">ABOUT SECTION PHOTO</text>
  <text x="400" y="460" text-anchor="middle" fill="#2a2a2a" font-family="sans-serif" font-size="12">Replace with your gym interior photo · 800×600</text>
</svg>
